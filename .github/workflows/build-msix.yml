name: Build Xbox MSIX
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Clean previous builds
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Include bin,obj -Recurse | Remove-Item -Recurse -Force

      - name: Create self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=MaxiBooth" `
            -KeyUsage DigitalSignature -FriendlyName "MaxiBoothCert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "booth" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath MaxiCoastRush\cert.pfx -Password $pwd
          Export-Certificate    -Cert $cert -FilePath MaxiBooth.cer
          echo "THUMB=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        run: msbuild MaxiCoastRush\MaxiCoastRush.csproj /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Build + package (Release x64, sideloading)
        shell: pwsh
        run: |
          msbuild MaxiCoastRush\MaxiCoastRush.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Never `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile=cert.pfx `
            /p:PackageCertificatePassword=booth `
            /p:PackageCertificateThumbprint=$env:THUMB `
            /p:AppxPackageDir=..\AppPackages\ `
            /p:CopyBuildOutputToOutputDirectory=true `
            /p:CopyOutputSymbolsToOutputDirectory=true `
            /p:OutDir=..\bin\x64\Release\

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item MaxiBooth.cer out\
          Get-ChildItem -Recurse AppPackages -Include *.msix,*.appx | Copy-Item -Destination out\

      - uses: actions/upload-artifact@v4
        with:
          name: xbox-package
          path: out/*
